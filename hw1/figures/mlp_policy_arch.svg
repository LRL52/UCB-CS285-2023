<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="hiddenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="paramGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="distGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="420" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">MLPPolicySL Architecture (Gaussian Policy)</text>

  <!-- ==================== mean_net branch (top) ==================== -->
  <!-- Brace label -->
  <text x="340" y="62" text-anchor="middle" font-size="11" fill="#666" font-style="italic">mean_net  (nn.Sequential)</text>
  <line x1="88" y1="66" x2="592" y2="66" stroke="#BBB" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Input layer -->
  <rect x="30" y="80" width="116" height="54" rx="8" fill="url(#inputGrad)" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="88" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#2E7D32">Input</text>
  <text x="88" y="122" text-anchor="middle" font-size="11" fill="#555">ob_dim</text>

  <!-- Arrow -->
  <line x1="146" y1="107" x2="176" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Hidden layer 1 -->
  <rect x="180" y="80" width="116" height="54" rx="8" fill="url(#hiddenGrad)" stroke="#42A5F5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="238" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Linear + Tanh</text>
  <text x="238" y="118" text-anchor="middle" font-size="11" fill="#555">ob_dim &#x2192; size</text>

  <!-- Arrow -->
  <line x1="296" y1="107" x2="326" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Hidden layer 2 -->
  <rect x="330" y="80" width="116" height="54" rx="8" fill="url(#hiddenGrad)" stroke="#42A5F5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="388" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Linear + Tanh</text>
  <text x="388" y="118" text-anchor="middle" font-size="11" fill="#555">size &#x2192; size</text>

  <!-- Arrow -->
  <line x1="446" y1="107" x2="476" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output layer (mean) -->
  <rect x="480" y="80" width="116" height="54" rx="8" fill="url(#outputGrad)" stroke="#FFA726" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="538" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#E65100">Linear</text>
  <text x="538" y="118" text-anchor="middle" font-size="11" fill="#555">size &#x2192; ac_dim</text>

  <!-- Arrow to mu -->
  <line x1="596" y1="107" x2="626" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- mu node -->
  <rect x="630" y="82" width="60" height="50" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#F57F17">&#x03BC;</text>

  <!-- ==================== logstd branch (bottom) ==================== -->
  <!-- logstd parameter -->
  <rect x="330" y="200" width="140" height="54" rx="8" fill="url(#paramGrad)" stroke="#AB47BC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#6A1B9A">logstd</text>
  <text x="400" y="240" text-anchor="middle" font-size="11" fill="#555">nn.Parameter [ac_dim]</text>

  <!-- Arrow to exp -->
  <line x1="470" y1="227" x2="500" y2="227" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- exp() -->
  <rect x="504" y="206" width="64" height="42" rx="20" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="536" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#6A1B9A">exp</text>

  <!-- Arrow to sigma -->
  <line x1="568" y1="227" x2="626" y2="227" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- sigma node -->
  <rect x="630" y="202" width="60" height="50" rx="8" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="232" text-anchor="middle" font-size="16" font-weight="bold" fill="#6A1B9A">&#x03C3;</text>

  <!-- ==================== Gaussian distribution ==================== -->
  <!-- Arrows from mu and sigma to distribution -->
  <line x1="690" y1="107" x2="712" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="690" y1="227" x2="712" y2="194" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Distribution box -->
  <rect x="716" y="134" width="52" height="66" rx="10" fill="url(#distGrad)" stroke="#E91E63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="742" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#AD1457">&#x1D4A9;</text>
  <text x="742" y="180" text-anchor="middle" font-size="10" fill="#AD1457">(&#x03BC;, &#x03C3;&#xB2;)</text>

  <!-- ==================== Concrete example (Ant-v4) ==================== -->
  <line x1="30" y1="290" x2="750" y2="290" stroke="#E0E0E0" stroke-width="1"/>
  <text x="390" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Ant-v4 Example (n_layers=2, size=64)</text>

  <!-- Concrete sizes -->
  <rect x="30" y="335" width="90" height="46" rx="7" fill="url(#inputGrad)" stroke="#66BB6A" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="75" y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">obs</text>
  <text x="75" y="370" text-anchor="middle" font-size="11" fill="#555">[B, 27]</text>

  <line x1="120" y1="358" x2="148" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="152" y="335" width="110" height="46" rx="7" fill="url(#hiddenGrad)" stroke="#42A5F5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="207" y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">Linear+Tanh</text>
  <text x="207" y="370" text-anchor="middle" font-size="11" fill="#555">27 &#x2192; 64</text>

  <line x1="262" y1="358" x2="290" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="294" y="335" width="110" height="46" rx="7" fill="url(#hiddenGrad)" stroke="#42A5F5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="349" y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">Linear+Tanh</text>
  <text x="349" y="370" text-anchor="middle" font-size="11" fill="#555">64 &#x2192; 64</text>

  <line x1="404" y1="358" x2="432" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="436" y="335" width="90" height="46" rx="7" fill="url(#outputGrad)" stroke="#FFA726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="481" y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100">Linear</text>
  <text x="481" y="370" text-anchor="middle" font-size="11" fill="#555">64 &#x2192; 8</text>

  <line x1="526" y1="358" x2="554" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="558" y="335" width="56" height="46" rx="7" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="586" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57F17">&#x03BC;</text>
  <text x="586" y="370" text-anchor="middle" font-size="11" fill="#555">[B, 8]</text>

  <line x1="614" y1="346" x2="638" y2="346" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <line x1="614" y1="370" x2="638" y2="370" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- sigma concrete -->
  <rect x="558" y="392" width="56" height="20" rx="5" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1"/>
  <text x="586" y="406" text-anchor="middle" font-size="10" fill="#6A1B9A">&#x03C3; [8]</text>

  <line x1="614" y1="402" x2="638" y2="380" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- N box -->
  <rect x="642" y="335" width="46" height="46" rx="8" fill="url(#distGrad)" stroke="#E91E63" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="665" y="354" text-anchor="middle" font-size="13" font-weight="bold" fill="#AD1457">&#x1D4A9;</text>
  <text x="665" y="370" text-anchor="middle" font-size="9" fill="#AD1457">(&#x03BC;,&#x03C3;&#xB2;)</text>

  <line x1="688" y1="358" x2="710" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- action output -->
  <text x="724" y="352" text-anchor="start" font-size="12" font-weight="600" fill="#AD1457">a</text>
  <text x="724" y="368" text-anchor="start" font-size="11" fill="#555">[B, 8]</text>

  <!-- Legend note -->
  <text x="390" y="414" text-anchor="middle" font-size="10" fill="#999">B = batch size; state-independent &#x03C3; shared across all observations</text>
</svg>
